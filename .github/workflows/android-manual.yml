name: 'Android Manual Build'

on:
  workflow_dispatch:
    inputs:
      debug_build:
        description: 'Specifies if it is a debug build or a release build'
        default: false
        required: false
        type: boolean

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules/
          key: node_modules-${{ runner.os }}-${{ hashFiles('yarn.lock') }}

      - name: Install node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'

      - run: npm install yarn -g
      - run: yarn install --immutable --immutable-cache --check-cache
      - run: yarn build

      - name: Generate Capacitor Config
        run: node capacitor.config.generator.mjs

      - name: Sync Capacitor Android Project
        run: npx cap sync android

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Build Android APK
        run: |
          pushd android >/dev/null
          ./gradlew clean
          ./gradlew assembleRelease --stacktrace
          popd >/dev/null

      - name: Set APK name and prepare artifact
        id: apk_step
        run: |
          VERSION=$(jq -r '.version' package.json)
          mkdir -p artifacts
          
          # 检测 APK 路径
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: No APK found"
            exit 1
          fi
          
          apk_name="dingtalk-${VERSION}.apk"
          cp "$APK_PATH" "artifacts/$apk_name"
          echo "apk_name=$apk_name" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pid-calculator-apk
          path: artifacts/${{ steps.apk_step.outputs.apk_name }}
          retention-days: 7
